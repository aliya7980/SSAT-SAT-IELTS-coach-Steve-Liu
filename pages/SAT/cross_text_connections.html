<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAT Cross-Text Connections Practice</title>
<style>

:root{--ink:#1f2937;--muted:#6b7280;--brand:#2563eb;--bg:#f6f8fc;--card:#fff;--line:#e5e7eb;--ok:#16a34a;--bad:#dc2626;}
*{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.55}.wrap{max-width:1050px;margin:0 auto;padding:28px 18px 80px}.hero{background:linear-gradient(135deg,#1d4ed8,#38bdf8);color:white;border-radius:24px;padding:30px;box-shadow:0 16px 40px rgba(37,99,235,.22)}.hero h1{margin:0 0 8px;font-size:32px}.hero p{margin:0;opacity:.95}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0}.btn{border:0;border-radius:12px;padding:10px 14px;font-weight:700;cursor:pointer;background:#111827;color:white}.btn.secondary{background:white;color:#111827;border:1px solid var(--line)}.btn.green{background:var(--ok)}.question-card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:22px;margin:18px 0;box-shadow:0 8px 24px rgba(15,23,42,.06)}.qhead{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:12px}.qnum{font-size:20px;font-weight:800;color:#111827}.skill{font-size:13px;color:var(--muted);background:#eef2ff;padding:5px 9px;border-radius:999px}.passage{white-space:pre-wrap;background:#f9fafb;border-left:5px solid #93c5fd;padding:15px;border-radius:12px;margin:12px 0 16px}.choices{display:grid;gap:10px}.choice{display:flex;gap:10px;align-items:flex-start;border:1px solid var(--line);border-radius:12px;padding:10px 12px;cursor:pointer;background:white}.choice:hover{border-color:#93c5fd;background:#eff6ff}.choice.selected{border-color:#2563eb;background:#eff6ff;box-shadow:0 0 0 2px rgba(37,99,235,.12)}.choice input{margin-top:5px}.letter{font-weight:800;min-width:22px}.summary{background:rgba(255,255,255,.97);backdrop-filter:blur(8px);border:1px solid var(--line);border-radius:18px;padding:16px;margin-top:24px;box-shadow:0 8px 30px rgba(15,23,42,.08)}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(84px,1fr));gap:8px}.sum-item{border:1px solid var(--line);border-radius:10px;padding:8px;background:#f9fafb;font-size:14px}.answer-key{background:#fff7ed;border:1px solid #fed7aa;border-radius:18px;padding:18px;margin:24px 0}.key-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:10px}.key-box label{display:block;font-size:12px;color:var(--muted);margin-bottom:3px}.key-box select{width:100%;padding:8px;border-radius:10px;border:1px solid var(--line)}.correct{border-color:#22c55e!important;background:#f0fdf4!important}.incorrect{border-color:#ef4444!important;background:#fef2f2!important}@media print{.toolbar,.answer-key .btn,.summary .btn{display:none}.summary{position:static}.question-card{box-shadow:none;break-inside:avoid}.hero{box-shadow:none}}

.hero .tag{display:inline-block;margin-top:14px;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.35);padding:6px 10px;border-radius:999px;font-weight:700;font-size:13px}
.passage strong{color:#111827}.text-label{font-weight:800;color:#1d4ed8;margin-top:10px}.answered{border-color:#93c5fd;background:#eff6ff}

</style>
</head>
<body>
<div class="wrap">
  <section class="hero">
    <h1>SAT Cross-Text Connections Practice</h1>
    <p>Read Text 1 and Text 2 carefully. Choose the answer that best explains how the two texts relate to each other.</p>
    <span class="tag">16 Questions · SAT Reading & Writing</span>
  </section>

  <div class="toolbar">
    <button class="btn secondary" onclick="clearAnswers()">Clear Answers</button>
    <button class="btn green" onclick="copySummary()">Copy answer summary</button>
    
  </div>

  <main id="questions"></main>

  <section class="summary">
    <h2>Student Answer Summary</h2>
    <p><strong>Answered:</strong> <span id="answeredCount">0</span> / <span id="totalCount">16</span></p>
    <div class="grid" id="summaryGrid"></div>
    <div class="toolbar">
      <button class="btn secondary" onclick="clearAnswers()">Clear Answers</button>
      <button class="btn green" onclick="copySummary()">Copy answer summary</button>
      
    </div>
  </section>
</div>

<script>
const questions = [{"q": 1, "passage": "Text 1\n\nThe poet Audre Lorde once claimed that poetry is the most inexpensive of art forms to practice. While people who pursue other art forms—sculpture, architecture, long-form prose—require large blocks of uninterrupted time as well as money to complete their work, poets can write, as Lorde said, \"between shifts, in the hospital pantry, on the subway, and on scraps of surplus paper.\" So poets can make worthwhile art even if they must earn their living in another way.\n\nText 2\n\nAny assessment of the state of contemporary poetry must reckon with the professionalization of the field. While it is possible in theory for anyone to publish in Virginia Quarterly Review, Kenyon Review, or a similar major poetry outlet, many people who do so have professional training in poetry and extensive practice writing it, which requires time not often available to those who must also work full-time jobs. Thus, financial security indirectly affects which people become poets.\n\nBased on the texts, how would Lorde (Text 1) most likely respond to the argument presented in Text 2?", "choices": ["By indicating that those poets who publish in major poetry journals are most likely to be able to earn a living by writing poetry", "By pointing out that people can produce valuable poetry in other circumstances than those described by the author of Text 2", "By suggesting that those artists who specialize in more financially rewarding artistic forms are unlikely to also be successful as poets", "By asserting that people often work full-time jobs in order to afford the professional training described in Text 2"]}, {"q": 2, "passage": "Text 1\n\nIsaac Asimov, author of The Caves of Steel and The Stars, Like Dust, is highly regarded despite his mediocre writing style. His prose is workmanlike; his characters are flat and discuss ideas rather than emotions. That his work is enjoyable despite this is a testament to his prodigious imagination—even if people read his books only for the ideas, they will have plenty to consider.\n\nText 2\n\nAsimov is critiqued for his style, but it is wrong to fault a writer for failing to do what he never intended to do. For example, although most of his novel Foundation consists of people discussing science and politics and we find out little about his characters’ lives, Asimov wanted to convey the vast sweep of human history over centuries, and one of his points is that at such a timescale, individuals don’t matter. Thus, his lack of characterization is central to his thematic aims.\n\nBased on the texts, how would the author of Text 2 most likely respond to the description of Asimov’s characters in the underlined portion of Text 1?", "choices": ["Asimov’s characterizations would have been richer if he had possessed a deeper understanding of history.", "The flatness of Asimov’s characters is a feature of The Caves of Steel and The Stars, Like Dust but not of Foundation.", "The flatness of Asimov’s characters should not necessarily be considered a flaw in his writing.", "Asimov’s characterizations would have been more believable if his writing had discussed fewer ideas."]}, {"q": 3, "passage": "Text 1\n\nIsaac Asimov, author of The Naked Sun and The Gods Themselves, is highly regarded despite his mediocre writing style. His prose is workmanlike; his characters are flat and discuss ideas rather than emotions. That his work is enjoyable despite this is a testament to his prodigious imagination—even if people read his books only for the ideas, they will have plenty to consider.\n\nText 2\n\nAsimov is critiqued for his style, but it is wrong to fault a writer for failing to do what he never intended to do. For example, although most of his novel Foundation consists of people discussing science and politics and we find out little about his characters’ lives, Asimov wanted to convey the vast sweep of human history over centuries, and one of his points is that at such a timescale, individuals don’t matter. Thus, his lack of characterization is central to his thematic aims.\n\nBased on the texts, the author of Text 1 would most likely agree with the author of Text 2 on which point?", "choices": ["The Naked Sun is more representative of Asimov’s writing style than Foundation is.", "Asimov’s writing style is often unfairly criticized.", "Asimov’s characters can be concerned mainly with intellectual matters rather than emotions.", "Asimov was correct to suggest that individual humans have little influence over the course of human history."]}, {"q": 4, "passage": "Text 1\n\nIsaac Asimov, author of Nemesis and The Stars, Like Dust, is highly regarded despite his mediocre writing style. His prose is workmanlike; his characters are flat and discuss ideas rather than emotions. That his work is enjoyable despite this is a testament to his prodigious imagination—even if people read his books only for the ideas, they will have plenty to consider.\n\nText 2\n\nAsimov is critiqued for his style, but it is wrong to fault a writer for failing to do what he never intended to do. For example, although most of his novel Foundation consists of people discussing science and politics and we find out little about his characters’ lives, Asimov wanted to convey the vast sweep of human history over centuries, and one of his points is that at such a timescale, individuals don’t matter. Thus, his lack of characterization is central to Asimov’s thematic aims.\n\nBased on the texts, how would the author of Text 2 most likely respond to the evaluation of Asimov’s writing style in the underlined claim in Text 1?", "choices": ["By arguing that Asimov’s writing style should be judged against the styles of historians rather than those of fiction writers", "By asserting that Asimov’s minimal characterization is likely a conscious choice that helps him convey an important idea", "By pointing out that the flatness of Asimov’s characters is a feature of Nemesis and The Stars, Like Dust but not of Foundation", "By agreeing that Asimov’s prose is flawed but disagreeing about the quality of his characters"]}, {"q": 5, "passage": "Text 1\n\nToni Morrison’s 1973 novel Sula, a tale of two women’s lives set in small-town Ohio from the 1910s to the 1960s, has been described as historical fiction. While it’s inarguable that Morrison’s book takes place in the past rather than in her own time, Sula is much richer and more complicated than the mere re-creation of the past suggested by the term “historical fiction.”\n\nText 2\n\nSome literary critics dismiss historical fiction as a shallow genre in which writers show off their knowledge of period details rather than tell meaningful stories. But historical fiction can be used to explore profound themes and complex characters—in fact, many writers find that writing about the past gives them a creative freedom they’d lack if they wrote about the present.\n\nBased on the texts, how would the author of Text 2 most likely respond to the claim about Sula advanced by the author of Text 1?", "choices": ["By arguing that Morrison displays a thorough knowledge of historical details in Sula.", "By asserting that dissatisfaction with describing Sula as historical fiction reflects a misunderstanding of the genre.", "By conceding that the genre of historical fiction contains many works that are less sophisticated than Sula is.", "By claiming that the author of Text 1 has underestimated the richness and complexity of Sula."]}, {"q": 6, "passage": "Text 1\n\nIn southern and central Georgia, many buildings and other structures rest on soil that is expansive, meaning that it swells or shrinks as its moisture level changes. Civil engineer Jay X. Wang has noted that the effects of expansive soil appear slowly in the form of gradually growing cracks in foundations, walls, and pavements. Because these effects are incremental and can generally be repaired (though at some cost), structures in southern and central Georgia are typically not built to resist them.\n\nText 2\n\nIn a 2021 study, Rubayet Bin Mostafiz and colleagues calculated that in the state of Louisiana alone, the annual cost of damage caused by expansive soils reaches nearly $90 million. But they note that this damage can be mitigated: building vapor barriers between structural foundations and the soil can significantly reduce the effects of soil swelling and shrinking.\n\nBased on the texts, how would Rubayet Bin Mostafiz and colleagues (Text 2) most likely respond to the information presented in Text 1?", "choices": ["They would encourage engineers in southern and central Georgia to insert vapor barriers between new structures’ foundations and the surrounding soil.", "They would argue that engineers in southern and central Georgia have misjudged the effectiveness of the techniques they use to reduce the effects of expansive soil.", "They would suggest that engineers in southern and central Georgia consider the cost of reinforcing the vapor barriers between existing structural foundations and the soil.", "They would recommend that engineers in southern and central Georgia measure the moisture level in the soil beneath proposed structures before beginning construction."]}, {"q": 7, "passage": "Text 1\n\nScholarship today overrepresents formal experimentation, such as William Carlos Williams’s use of minimalistic, image-based structures, well beyond the degree to which it actually influenced US poetry during the modernist period (roughly 1900–1945). Meanwhile, the work of Countee Cullen, who relied on conventional poetic forms associated with previous literary periods, attracts woefully little attention from scholars of modernism.\n\nText 2\n\nDistant reading, or computer-assisted quantitative analysis of massive collections of digitized texts, can reveal stylistic elements that have heretofore escaped notice, despite being shared by numerous texts from the modernist period. For too long, scholars have focused on experimental versus conventional poetic forms, inhibiting inquiry into other points of stylistic correspondence among poems that would enrich our understanding of the modernist canon.\n\nBased on the texts, how would the author of Text 2 most likely regard the emphasis that Text 1 places on poetic form during the modernist period?", "choices": ["As having the effect of forestalling consideration of the full stylistic dimensions of poetry written in the period", "As overestimating the impact that poetic form, whether experimental or conventional, has on the reading experience", "As being founded on a misconception about modernist poetry that has been called into question by distant reading", "As complementing the study of other stylistic features that distinguish the modernist period"]}, {"q": 8, "passage": "Text 1\n\nScholarship today overrepresents experimentally fragmented narrative structures, such as that of Jean Toomer’s Cane, beyond the degree to which they actually influenced fiction in the United States during the modernist period (roughly 1900–1945). Meanwhile, Ellen Glasgow’s Barren Ground, whose coherent, linear narrative structure recalls the fiction of previous centuries, attracts woefully little attention from scholars of modernism.\n\nText 2\n\nDistant reading, or computer-assisted quantitative analysis of massive collections of digitized texts, can reveal stylistic elements that have heretofore escaped notice, despite being shared by numerous texts from the modernist period. For too long, scholars have focused on narrative fragmentation versus coherence, inhibiting inquiry into other points of stylistic correspondence among works that would enrich our understanding of the modernist canon.\n\nBased on the texts, both the author of Text 1 and the author of Text 2 would most likely agree with which statement about scholarship on the modernist period in the United States?", "choices": ["At present, it only partially captures the stylistic dimensions of the fiction written in the period.", "Its primary methods for analyzing fiction written in the period are growing obsolete as computer technology advances.", "Instead of engaging in unproductive debates, it should work to rehabilitate the reputations of neglected modernist works.", "It must widen its focus to include aspects of modernist fiction beyond style, a productive but overrepresented site of inquiry."]}, {"q": 9, "passage": "Text 1\n\nA conservation group representing 11 tribal nations in the Great Lakes region reported to various state and federal natural resources agencies operating in the region that the firefly (waawaatesi in the Ojibwe language) will likely fare significantly worse than the black bear (makwa in Ojibwe) due to rising temperatures over the next 50 years. This collaborative approach has helped build trust between government and tribal groups, which will likely improve the quality of any joint conservation projects.\n\nText 2\n\nState and federal natural resources agencies are increasingly incorporating traditional ecological knowledge from tribal groups in the agencies’ plans to address threats to natural resources due to increasing temperatures. This approach has helped build positive relationships between tribal groups and these agencies and furthermore tends to lead to better conservation outcomes.\n\nBased on the texts, both authors would most likely agree with which statement?", "choices": ["Natural resources conservation projects are likely to benefit from collaboration between tribal and government groups.", "A collaborative approach to conservation is likely to help reduce the predicted temperature increases in the Great Lakes region.", "In the Great Lakes region, it is more important to focus conservation efforts on the firefly than it is to focus on the black bear.", "In the Great Lakes region, conservation efforts focused on the firefly are likely to be more effective than those focused on the black bear."]}, {"q": 10, "passage": "Text 1\n\nAs our planet experiences a big rise in temperature, an increasing number of glaciers begin to melt. In consequence, the existence of polar bears is severely threatened and in desperate need of protection. In contrast, the black bears’ survival is little affected by climate change. To preserve the ecosystem, we sometimes need to prioritize some animals over others.\n\nText 2\n\nAmerican animal protection agencies claim that due to limited resources, they can now only focus on the protection of the animals which are on the verge of extinction and turn a blind eye to those animals whose situations are not so urgent.\n\nBased on the texts, both authors would most likely agree with which statement?", "choices": ["People should exploit more resources to save these endangered animals.", "Polar bears are more vulnerable to climate change than black bears.", "The government should pay close attention to animals that are close to extinction.", "The protection of some animal species takes precedence over others."]}, {"q": 11, "passage": "Text 1\n\nAccording to a study by a conservation group representing 11 tribal nations in the Great Lakes region, the firefly (waawaatesi in the Ojibwe language) will have significantly worse outcomes over the next 50 years if temperatures increase as much as some models suggest. By contrast, the white-tailed deer (waawaashkeshi in Ojibwe) should be able to withstand the highest predicted warming without much harm and so likely won’t require the conservation efforts that the firefly will.\n\nText 2\n\nUS government agencies involved in conservation are unfortunately not able to address every possible threat to natural resources. They must use the best information available to decide which species are most threatened and therefore most in need of conservation efforts.\n\nBased on the texts, both authors would most likely agree with which statement?", "choices": ["A collaborative approach is necessary to keep temperatures in the Great Lakes region from increasing to the highest predicted levels.", "Agencies involved in natural-resource management in the Great Lakes region should focus their conservation efforts more on the firefly than on the white-tailed deer.", "Conservation efforts focused on the firefly are more likely to be successful if they incorporate state and federal agency resources with the knowledge of tribal groups in those efforts.", "State, federal, and tribal groups involved in natural-resource management in the Great Lakes region should immediately begin conservation programs for both the firefly and white-tailed deer."]}, {"q": 12, "passage": "Text 1\n\nWhen the 50-second-long film Arrival of the Train—which depicts what its title says, a train pulling into a station—was first shown publicly in 1896, spectators, naive to the new medium of film and seeing a train appearing to come directly at them, leaped from their seats and fled the room. This moment marks a major cultural shift: a new way of representing and seeing the world had arrived with that train, and nothing would ever be the same.\n\nText 2\n\nThe fact that there is no contemporary evidence that the first audience of Arrival of the Train was alarmed has not stopped the story from becoming canonical, even among film historians. But that phenomenon itself is highly revealing. Our belief that the coming of film was transformative is so strong that we invented and keep retelling a founding myth that divides cultural history into a naive “before” and sophisticated “after.”\n\nBased on the texts, the author of Text 2 would most likely agree with which statement about the description of the first showing of Arrival of the Train in Text 1?", "choices": ["It is not based on evidence and reflects film historians’ belief that they are more sophisticated than today’s audiences.", "It expresses a view about the transformative nature of film that film historians tend to regard as naive.", "It is more motivated by a perception of the significance of the invention of film than by facts.", "It reflects a misconception that is widely believed because it captures early film audiences’ sense that the new medium was alarming."]}, {"q": 13, "passage": "Text 1\n\nIn separate studies, Stephen Meding and Robert J. Zasoski and Xinhua He and colleagues examined whether plants transfer nutrients to one another using a common mycorrhizal network (CMN)—a lattice of fungal strands in the soil. Meding and Zasoski excluded all pathways other than the CMN by using barriers to keep the plants’ root systems separate while allowing mycorrhizal strands through—a crucial step He and colleagues’ study did not take.\n\nText 2\n\nMeding and Zasoski took the necessary precaution of separating the plants’ root systems, thereby excluding root-to-root transmission. However, any barrier used must allow the thread-like hyphae of a CMN to pass through, and this permeability would also allow liquids through. Thus, the researchers’ experimental design cannot ensure that any nutrient transfer observed can be attributed to a CMN and not to some other pathway.\n\nBased on the texts, which choice best describes a point on which the author of Text 1 and the author of Text 2 would most likely agree?", "choices": ["Meding and Zasoski’s study effectively excluded any explanation for nutrient transfer other than via a CMN.", "Excluding root-to-root transfer of nutrients between plants is sufficient to ensure that any observed nutrient transfer must involve a CMN.", "He and colleagues’ study was not designed in a way that would allow it to produce compelling evidence that nutrient transfer occurred via a CMN.", "A barrier that is impervious to both roots and fungal strands is necessary to evaluate nutrient transfer via a CMN."]}, {"q": 14, "passage": "Text 1\n\nIn separate studies, Lingbo Meng and colleagues and Xinhua He and colleagues examined whether plants transfer nutrients to one another using a common mycorrhizal network (CMN)—a lattice of fungal strands in the soil. Meng and colleagues excluded all pathways other than the CMN by using barriers to keep the plants’ root systems separate while allowing mycorrhizal strands through—a crucial step He and colleagues’ study did not take.\n\nText 2\n\nMeng and colleagues took the necessary precaution of separating the plants’ root systems, thereby excluding root-to-root transmission. However, any barrier used must allow the thread-like hyphae of a CMN to pass through, and this permeability would also allow liquids through. Thus, the researchers’ experimental design cannot ensure that any nutrient transfer observed can be attributed to a CMN and not to some other pathway.\n\nBased on the texts, the author of Text 1 and the author of Text 2 would most likely give the same answer to which question?", "choices": ["Did He and colleagues’ study effectively exclude any nutrient pathway other than a CMN?", "Are the barriers used in Meng and colleagues’ study sufficient to ensure that nutrient transfer could only occur via a CMN?", "Is there an available barrier material that can block roots and liquids while allowing fungal strands through?", "Do plants that transfer nutrients through a root-to-root pathway also transmit nutrients via a CMN?"]}, {"q": 15, "passage": "Text 1\n\nIn parts of New Zealand, the stoat is a major predator of the house mouse. Researcher G. L. Blackwell and colleagues found that when this predation pressure on house mice was temporarily reduced, their numbers significantly increased. This finding illustrates a foundational ecological principle: predators control prey population numbers.\n\nText 2\n\nFrançois Potvin and colleagues found that excluding wolves from a site in Quebec, Canada, where they typically prey on white-tailed deer had no significant effect on white-tailed deer abundance. Many other predation relief studies show an increase in prey abundance, but those studies often focus on small, rapidly reproducing prey, like birds, mice, and frogs, rather than large, slowly reproducing prey, like white-tailed deer, which could account for the difference between those results and Potvin and colleagues’ results.\n\nBased on the texts, the author of Text 2 would most likely agree with which statement about Blackwell and colleagues’ findings (Text 1)?", "choices": ["They may have been different if the ratio of the body size of stoats to that of house mice was greater than it is.", "They may reflect a response that does not tend to be observed in prey species other than house mice.", "They may be partially explained by the fact that stoats are smaller and reproduce more rapidly than wolves.", "They may be partially attributable to physical characteristics of house mice that are not shared by white-tailed deer."]}, {"q": 16, "passage": "Text 1\n\nIn parts of the Northwest Territories, Canada, the rough-legged hawk is a major predator of the collared lemming. Researcher Alice Kenney and colleagues found that when this predation pressure on collared lemmings was temporarily reduced, their numbers significantly increased. This finding illustrates a foundational ecological principle: predators control prey population numbers.\n\nText 2\n\nRobert D. Hayes and colleagues found that excluding wolves from a site in Yukon, Canada, where they typically prey on Dall sheep had no significant effect on Dall sheep abundance. Many other predation relief studies show an increase in prey abundance, but those studies often focus on small, rapidly reproducing prey, like birds, lemmings, and rabbits, rather than large, slowly reproducing prey, like Dall sheep, which could account for the difference between those results and Hayes and colleagues’ results.\n\nBased on the texts, the author of Text 2 would most likely agree with which statement about the “principle” mentioned in Text 1?", "choices": ["It has some evidential support, but it should not be regarded as universally applicable.", "It has been challenged by some studies, but the findings of those studies have not been widely accepted.", "It may be true for some predators but only because those predators share certain physical characteristics.", "It is plausible, but many of the studies that support it have methodological flaws."]}];
const total = questions.length;
const letters = ["A", "B", "C", "D"];

function escapeHtml(str) {
  return str.replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

function renderQuestions() {
  document.getElementById("totalCount").textContent = total;
  const main = document.getElementById("questions");
  const summary = document.getElementById("summaryGrid");

  main.innerHTML = questions.map(q => `
    <section class="question-card" id="q${q.q}">
      <div class="qhead">
        <div class="qnum">Question ${q.q}</div>
        <div class="skill">Cross-Text Connections</div>
      </div>
      <div class="passage">${escapeHtml(q.passage)}</div>
      <div class="choices">
        ${q.choices.map((choice, idx) => `
          <label class="choice" data-question="${q.q}" data-letter="${letters[idx]}">
            <input type="radio" name="q${q.q}" value="${letters[idx]}">
            <span class="letter">${letters[idx]}.</span>
            <span>${escapeHtml(choice)}</span>
          </label>
        `).join("")}
      </div>
    </section>
  `).join("");

  summary.innerHTML = questions.map(q => `
    <div class="sum-item" id="sum${q.q}"><strong>Q${q.q}</strong>: <span>—</span></div>
  `).join("");

  document.querySelectorAll('input[type="radio"]').forEach(input => {
    input.addEventListener('change', updateSummary);
  });
}

function updateSummary() {
  let answered = 0;
  for (let i = 1; i <= total; i++) {
    const chosen = document.querySelector(`input[name="q${i}"]:checked`);
    const box = document.getElementById(`sum${i}`);
    const val = chosen ? chosen.value : '—';

    if (box) {
      box.querySelector('span').textContent = val;
      box.classList.toggle('answered', Boolean(chosen));
    }

    document.querySelectorAll(`label.choice[data-question="${i}"]`).forEach(label => {
      label.classList.toggle('selected', chosen && label.dataset.letter === chosen.value);
    });

    if (chosen) answered++;
  }
  document.getElementById('answeredCount').textContent = answered;
}

function clearAnswers() {
  document.querySelectorAll('input[type="radio"]').forEach(input => {
    input.checked = false;
  });
  updateSummary();
}

function printPage() {
  window.print();
}

function copySummary() {
  const lines = [];
  for (let i = 1; i <= total; i++) {
    const chosen = document.querySelector(`input[name="q${i}"]:checked`);
    lines.push(`Q${i}: ${chosen ? chosen.value : '—'}`);
  }

  navigator.clipboard.writeText(lines.join('\n')).then(() => {
    alert('Student answer summary copied.');
  }).catch(() => {
    alert(lines.join('\n'));
  });
}

renderQuestions();
updateSummary();
</script>
</body>
</html>
