<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HuskyDaddy | SAT, SSAT, Reading & Writing Coaching</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      font-family: Georgia, "Times New Roman", serif;
      color: #102a43;
      background: #f8f3e8;
      line-height: 1.6;
    }

    a { text-decoration: none; }

    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
      padding: 18px 7%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(7, 31, 54, 0.84);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.16);
    }

    .logo {
      color: white;
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 0.4px;
    }

    .logo span {
      color: #d4af37;
    }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 28px;
      align-items: center;
    }

    .nav-links a {
      color: #f8fafc;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.3px;
      transition: 0.25s ease;
    }

    .nav-links a:hover {
      color: #d4af37;
    }

    .hero {
      min-height: 100vh;
      background:
        linear-gradient(90deg, rgba(7,31,54,0.38) 0%, rgba(7,31,54,0.20) 42%, rgba(7,31,54,0.05) 100%),
        url("../images/winding-trail.jpeg");
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      padding: 120px 7% 80px;
    }

    .hero-content {
      max-width: 690px;
      color: white;
    }

    .eyebrow {
      color: #d4af37;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-size: 14px;
      margin-bottom: 18px;
    }

    h1 {
      font-size: 58px;
      line-height: 1.12;
      margin-bottom: 24px;
      text-shadow: 0 3px 18px rgba(0,0,0,0.28);
    }

    .hero p {
      font-size: 22px;
      max-width: 600px;
      margin-bottom: 34px;
      color: #eef5fb;
    }

    .hero-button {
      display: inline-block;
      background: #d4af37;
      color: #102a43;
      padding: 14px 28px;
      border-radius: 4px;
      font-weight: bold;
      box-shadow: 0 12px 26px rgba(0,0,0,0.22);
      transition: 0.25s ease;
    }

    .hero-button:hover {
      background: #c19a2e;
      transform: translateY(-2px);
    }

    .simple-info {
      padding: 46px 7%;
      background: #f8f3e8;
      text-align: center;
    }

    .simple-info p {
      max-width: 860px;
      margin: auto;
      font-size: 20px;
      color: #243b53;
    }

    footer {
      padding: 24px 7%;
      background: #071f36;
      color: #e5e7eb;
      text-align: center;
      font-size: 15px;
    }

    @media (max-width: 850px) {
      .navbar {
        flex-direction: column;
        gap: 14px;
        padding: 16px 6%;
      }

      .nav-links {
        flex-wrap: wrap;
        justify-content: center;
        gap: 16px;
      }

      h1 { font-size: 42px; }
      .hero p { font-size: 19px; }
      .hero { padding: 150px 6% 70px; }
    }

    @media (max-width: 560px) {
      h1 { font-size: 34px; }
      .logo { font-size: 21px; }
      .nav-links a { font-size: 14px; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="logo">Husky<span>Daddy</span></div>
    <ul class="nav-links">
      <li><a href="../index.html">Home</a></li>
      <li><a href="../pages/services.html">Test Prep</a></li>
      <li><a href="../pages/readingtips.html">Reading</a></li>
      <li><a href="../pages/reading_summary.html">Homework</a></li>
      <li><a href="../pages/clients.html">Clients</a></li>
      <li><a href="../pages/contact.html">Contact</a></li>
    </ul>
  </nav>

  <section class="hero">
    <div class="hero-content">
     
      
    </div>
  </section>

  <section class="simple-info">
    <p>One clear path: understand the question, build the skill, review the mistake, and move forward with confidence.</p>
  </section>

  <footer>
    © 2025 Steve Liu · SAT / SSAT / ACT / IELTS · Reading & Writing Coaching
  </footer>

</body>
</html>
